#######
# Pipeline configuration
#######
# Set to true to add MgII line core emission
line_core_emission = 1
# Set to true to add ISM absorption
interstellar_absorption = 1

# Duration of one spacecraft orbit around Earth in minutes
# Used to compute roll angle evolution and number of exposures per orbit
orbit_duration_minutes = 90.0
# Number of orbit revolutions to simulate (floating-point value, e.g. 3.5)
orbit_revolutions = 1
# Detector readout gap between two science exposures in seconds. No photons are collected during this time. Floating-point value.
# The gap is used to account for the time it takes to read out the detector and prepare for the next exposure.
readout_gap_s = 20.0

#######
# Line core emission configuration
#######
# MgII column density (will be calculated if set to None)
mg2_col = None
# MgI column density (will be calculated if set to None)
mg1_col = None
# FeII column density (will be calculated if set to None)
fe2_col = None
# sigmaMgIIh -> MgII k line (2802 Å)
sigmaMg22 = 0.257
# sigmaMgIIk -> MgII h line (2795 Å)
sigmaMg21 = 0.288

#######
# logR fallback configuration
#######
enable_log_r_fallback = 1
log_r_teff_threshold = 6800
log_r_hot_value = -7
log_r_cool_value = -5


#######
# COSMIC RAY CONFIGURATION
#######
# cosmic ray hits per observation with 'cosmic'. Integer value.
cosmic_rays_min = 5
cosmic_rays_max = 10
# Cosmic ray charge per pixel [electrons], integer value.
cosmic_ray_signal_electrons = 72000
# Cosmic ray streak length range [pixels].
# Each cosmic ray length is randomly drawn between min and max (inclusive).
cosmic_ray_length_min_px = 10
cosmic_ray_length_max_px = 20


#######
# GAIA CONFIGURATION
#######
# Magnitude cutoff for background star calculation and Gaia fetching (G mag limit).
magnitude_cutoff = 20
# Use async Gaia TAP jobs (1) instead of synchronous (0).
GAIA_USE_ASYNC_JOBS = 1

#######
# Background configuration
#######
# Select type of background: Options "default" or "calc"
# default: use a fixed background spectrum from background_file
# calc: compute zodiacal-light background from Sun/target geometry (needs zodiacal tables and RA/Dec/JD)
background_type = calc
# Used when background_type = default
# Background File for background images: filename only, resolves as repo_root / "data" / background_file
background_file = background.txt
# Sky solid angle covered by one detector pixel [arcsec²].
# Used to convert background surface brightness (erg s⁻¹ cm⁻² Å⁻¹ arcsec⁻²) into flux per detector pixel.
sky_pixel_area_arcsec2 = 25.0
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_dist_file
# 2D lookup table for zodiacal brightness vs ecliptic latitude and Sun-target separation
zod_dist_file = zod_dist.txt
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_spectrum_file
# Reference zodiacal spectrum shape (scaled by zod_dist_file lookup result)
zod_spectrum_file = zod_spectrum.txt

#######
# Calibration Frame Settings
#######
# Number of non science frames (bias, dark, ...) to generate for calibration
n_calibration_frames = 1
# If set to 1, write PNG images for all non-science frames
# (bias, dark, photon_noise, background, scatter, etc.)
write_calibration_frames_png = 1
# If set to 1, write PNG images for all science frames
# If false, science frames are generated (fits but not written as PNG to the disk.
write_science_frames_png = 1


#### TEST/DEBUG configuration ####
# Enable test configuration.
# If set to 1, additional debug output and intermediate products are generated.
# I would not recommend enabling this for production runs.
test_mode = 0

# If set to 1, generate plots for the main science products
# (e.g. target star spectra / images).
produce_plots = 0

