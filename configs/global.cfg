#### Pipeline configuration ####
# Set to one to add MgII line core emission
line_core_emission = 1
# Set to one to add ISM absorption
interstellar_absorption = 1

#### Line core emission configuration ####
# MgII column density (will be calculated if set to None)
mg2_col = None
# MgI column density (will be calculated if set to None)
mg1_col = None
# FeII column density (will be calculated if set to None)
fe2_col = None
# sigmaMgIIh -> MgII k line (2802 Å)
sigmaMg22 = 0.257
# sigmaMgIIk -> MgII h line (2795 Å)
sigmaMg21 = 0.288

#### logR fallback configuration ####
enable_log_r_fallback = 1
log_r_teff_threshold = 6800
log_r_hot_value = -7
log_r_cool_value = -5

#### Calibration Frame Settings ####
# Number of bias and dark frames to generate for calibration (used to build master bias and dark)
n_bias_and_darkframes = 2

# If true, PNG images of generated frames will be written to disk
# I would not recommend to enable this for production runs.
write_dark_and_bias_png = true

# Number of science detector frames generated per channel.
# Currently deterministic (identical frames). >1 only useful for future time-dependent simulations.
n_science_frames_per_channel = 2

# If true, write science frames to FITS files.
# If false, science frames are generated but not written to disk.
write_science_frames_png = true

#### TEST/DEBUG configuration ####
# Enable Test configuration 
# this dumps the model and the flux snapshots for comparison or debugging reasons.
# I would not recommend to enable this for production runs.
test_mode = 0
produce_Plots = 1