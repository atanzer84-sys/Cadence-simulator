#######
# Pipeline Control:
#######
# Channel configuration for WALTzER pipeline execution
# Set to true to enable the channel pipeline run, false to skip it.
# Run the NUV (Near Ultraviolet) channel pipeline
run_nuv = 1
# Run the VIS (Visible) channel pipeline
run_vis = 1
# Run the NIR (Near Infrared) channel pipeline
run_nir = 1
# Set to true to add MgII line core emission
line_core_emission = 1
# Set to true to add ISM absorption
interstellar_absorption = 1

#######
# Timing and Observation:
#######
# Duration of one spacecraft orbit around Earth in minutes
# Used to compute roll angle evolution and number of exposures per orbit
orbit_duration_minutes = 90.0
# Number of orbit revolutions to simulate (floating-point value, e.g. 3.5)
orbit_revolutions = 0.5
# Detector readout gap between two science exposures in seconds. No photons are collected during this time. Floating-point value.
# The gap is used to account for the time it takes to read out the detector and prepare for the next exposure.
readout_gap_s = 20.0

#######
# GAIA CONFIGURATION
#######
# Magnitude cutoff for background star calculation and Gaia fetching (G mag limit).
magnitude_cutoff = 16
# Use async Gaia TAP jobs (1) instead of synchronous (0).
GAIA_USE_ASYNC_JOBS = 1
# gaia conesearch in arcseconds (Radius)
# dependent either on slit or detector size for NIR, whichever is larger. We do not want to call gaia more than necessary!
gaia_conesearch_radius_arcsec = 500.0

#######
# Interstellar Absorption (ISM) and Line Core Emission (LCE) Parameters
#######
# --- Interstellar Absorption (ISM) Parameters ---
# Log-column densities for Mg II, Mg I, and Fe II
# If set to None, the simulator automatically derives these values from the  
# interstellar reddening E(B-V) based on the star's coordinates and distance.
mg2_col = None  # MgII log-column density
mg1_col = None  # MgI log-column density
fe2_col = None  # FeII log-column density
# --- Line Core Emission (LCE) Width Parameters ---
# sigmaMg22 corresponds to the MgII k line (2802 Å)
sigmaMg22 = 0.257
# sigmaMg21 corresponds to the MgII h line (2795 Å)
sigmaMg21 = 0.288

#######
# Fallback and Stellar Parameter Handling
#######
enable_log_r_fallback = 1
log_r_teff_threshold = 6800
log_r_hot_value = -7
log_r_cool_value = -5

#######
# COSMIC RAY CONFIGURATION
#######
# cosmic ray hits per observation with 'cosmic'. Integer value.
cosmic_rays_min = 5
cosmic_rays_max = 10
# Cosmic ray charge per pixel [electrons], integer value.
cosmic_ray_signal_electrons = 72000
# Cosmic ray streak length range [pixels].
# Each cosmic ray length is randomly drawn between min and max (inclusive).
cosmic_ray_length_min_px = 10
cosmic_ray_length_max_px = 20

#######
# Background configuration
#######
# Select type of background: Options "default" or "calc"
# default: use a fixed background spectrum from background_file
# calc: compute zodiacal-light background from Sun/target geometry (needs zodiacal tables and RA/Dec/JD)
background_type = calc
# Used when background_type = default
# Background File for background images: filename only, resolves as repo_root / "data" / background_file
background_file = background.txt
# Sky solid angle covered by one detector pixel [arcsec²].
# Used to convert background surface brightness (erg s⁻¹ cm⁻² Å⁻¹ arcsec⁻²) into flux per detector pixel.
sky_pixel_area_arcsec2 = 25.0
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_dist_file
# 2D lookup table for zodiacal brightness vs ecliptic latitude and Sun-target separation
zod_dist_file = zod_dist.txt
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_spectrum_file
# Reference zodiacal spectrum shape (scaled by zod_dist_file lookup result)
zod_spectrum_file = zod_spectrum.txt

#######
# Output Control: Calibration and Science Frame Settings
#######
# Number of non science frames (bias, dark) to generate for calibration
n_calibration_frames = 0
# inverted color scale of calibration and science components frames (bias, dark, photon_noise, background, cosmic rays.)
# If set to 1, the color scale of the calibration frames will be inverted (white = black, black = white).
invert_calibration_science_frame_component = 1
# inverted color scale of science frames
# If set to 1, the color scale of the science frames will be inverted (white = black, black = white).
invert_science_frames = 1
# If set to 1, for spectroscopy channels only the spectrum strip (y0 ± rows of y0 spread) is written to the science frame PNG to reduce file size and runtime
science_frame_png_crop_spectrum_region = 0
# If set to 1, write PNG images for all science frames (per exposure per roll angle)
# If false, science frames are generated (fits but not written as PNG to the disk.
write_science_frames_png = 1

##########
# Output Control: TEST/DEBUG configuration
##########
# I highly discourage writing those PNG images for production runs. Performance will suffer.
#######
# If set to 1, write PNG images for all calibration frames (Bias and Dark)
write_calibration_frame_png = 0
# If set to 1, write PNG images for the intermediate components of each science frame (bias, dark, photon_noise, background, cosmic rays.)
write_science_frame_component_png = 0
# If set to 1, write FITS files for the intermediate components of each science frame (bias, dark, photon_noise, background, cosmic rays.)
write_science_frame_component_fits = 0
# Enable test configuration.
# If set to 1, additional debug output and intermediate products are generated.
# I would not recommend enabling this for production runs.
write_intermediate_arrays = 0
# If set to 1, generate plots for the science products:
# wavelength-dependent flux plots and convolution plots (e.g. target star and background stars spectra / images).
produce_flux_convolution_plots = 0