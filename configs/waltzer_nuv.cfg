# ------------------------------------------------------------------
# WALTZER NUV Channel Configuration
# ------------------------------------------------------------------
# Name of the detector channel (used for file naming and logging)
channel_name = NUV


#######
# Detector geometry
#######
# Number of spectral pixels (dispersion direction)
x_pixels = 2048
# Number of spatial pixels (cross-dispersion direction)
y_pixels = 515

# Spectral resolution model
# Instrumental FWHM = resolution_factor * pixel_scale
# Pixel scale is read from the effective area file header
resolution_factor = 2.0

#######
# DARK and BIAS: Detector noise properties
#######
# Dark current in electrons per second per pixel, similar to bias_offset, but for dark current
dark_noise = 0.012

# std deviation, similar to read_noise, mean dark current in electrons per second per pixel
dark_current_sigma = 0.001

# Read noise in electrons RMS per pixel
read_noise = 7.0

# Bias Properties
# Constant electronic offset added to every pixel (in electrons)
# This defines the mean level of the bias frame
bias_offset = 105.0

# CCD gain in electrons per ADU
ccd_gain = 1.0


#######
# Effective area: Instrument throughput file
#######
# Filename only. File resolves it as: repo_root / "data" / effective_area_file
effective_area_file = waltzer_nuv_eff_area.txt


#######
# Spectrograph properties:
#######
# 1 = single-order low-resolution mode (current default, one continuous spectrum on CCD)
# >1 = reserved for future multi-order / high-resolution modes (not implemented yet)
mode = 1

# Vertical spread (cross-dispersion) – choose exactly ONE:
# 1) spread_profile_file (str): Non-empty → use wavelength-dependent file (repo_root/data/…).
# 2) spread_around_y0_pix (int) > 0 → Gaussian fallback with |dy| ≤ N → y ∈ [y0 − N, y0 + N], total rows = 2*N + 1.
# If file empty AND N = 0 → configuration error.
spread_profile_file = nuv__cross_dispersion_spread.txt
spread_half_height_pix = 


#######
# Slit properties
#######
# Slit position in arcsec on the detector.
# x: horizontal offset from the first detector column (0.0 = start at x=0).
# y: vertical offset from the detector center (0.0 = y=ny//2).
slit_position_x_arcsec = 0.0
slit_position_y_arcsec = 0.0

# Linear spectrum position model:
# y = slope * x + intercept
# Currently only slope = 0.0 and intercept = 0.0 are supported.
slope = 0.0
intercept_pixels = 0.0

#######
# Background configuration
#######
# Select type of background: Options "default" or "calc"
# default: use a fixed background spectrum from background_file
# calc: compute zodiacal-light background from Sun/target geometry (needs zodiacal tables and RA/Dec/JD)
background_type = default
# Used when background_type = default
# Background File for background images: filename only, resolves as repo_root / "data" / background_file
background_file = background.txt
# Sky solid angle covered by one detector pixel [arcsec²].
# Used to convert background surface brightness (erg s⁻¹ cm⁻² Å⁻¹ arcsec⁻²) into flux per detector pixel.
sky_pixel_area_arcsec2 = 25.0
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_dist_file
# 2D lookup table for zodiacal brightness vs ecliptic latitude and Sun-target separation
zod_dist_file = zod_dist.txt
# Used when background_type = calc
# File is resolved as: repo_root / "data" / zod_spectrum_file
# Reference zodiacal spectrum shape (scaled by zod_dist_file lookup result)
zod_spectrum_file = zod_spectrum.txt