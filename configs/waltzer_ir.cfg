# ------------------------------------------------------------------
# WALTZER VIS Channel Configuration
# ------------------------------------------------------------------
# Name of the detector channel (used for file naming and logging)
channel_name = IR

#######
# Detector geometry
#######
# Number of spectral pixels (dispersion direction)
x_pixels = 4096
# Number of spatial pixels (cross-dispersion direction)
y_pixels = 2048

# Spectral resolution model
# Instrumental FWHM = resolution_factor * pixel_scale
# Pixel scale is read from the effective area file header
resolution_factor = 2.0

#######
# DARK and BIAS: Detector noise properties
#######
# Dark current in electrons per second per pixel, similar to bias_offset, but for dark current
dark_noise = 0.02

# std deviation, similar to read_noise, mean dark current in electrons per second per pixel
dark_current_sigma = 0.001

# Read noise in electrons RMS per pixel
read_noise = 7.0

# Constant electronic offset added to every pixel (in electrons)
# This defines the mean level of the bias frame
bias_offset = 110.0

# CCD gain in electrons per ADU
ccd_gain = 1.0


########UNSURE ABOUT THIS CHANNEL########
#######
# Effective area: Instrument throughput file
#######
# Filename only. File resolves it as: repo_root / "data" / effective_area_file
effective_area_file = waltzer_nir_eff_area.txt

# Photometric aperture diameter in detector pixels.
# Used to define circular extraction region and PSF width.
aperture_pix = 6.0

# Radial PSF profile file (distance in pixels, normalized flux).
# Used to build 2D normalized PSF kernel.
# Filename only. File resolves it as: repo_root / "data" / psf_profile_file
psf_profile_file = psf_waltzer_nir.txt
